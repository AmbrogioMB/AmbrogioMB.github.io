<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game of Life — Finite / Cylinder / Torus</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #d2d2d2; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
  #top { padding: 8px 12px; font-size: 13px; color: #888; }
  #canvas-wrap { position: relative; }
  canvas { display: block; cursor: crosshair; max-width: 100vw; }
  #hud {
    width: 100%; max-width: 900px;
    background: #1c1c1c; padding: 10px 14px;
    font-size: 13px; line-height: 1.7;
    border-top: 1px solid #333;
  }
  #hud .status { font-size: 14px; margin-bottom: 4px; }
  #hud .keys  { color: #888; margin-top: 4px; }
  #hud span.hi { color: #e0e0e0; }
  #controls {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 8px 14px; max-width: 900px; width: 100%;
    background: #1c1c1c; border-top: 1px solid #2a2a2a;
  }
  #controls .sep { width: 100%; height: 0; border-top: 1px solid #2a2a2a; margin: 2px 0; }
  button {
    background: #2a2a2a; color: #d2d2d2; border: 1px solid #444;
    padding: 5px 14px; cursor: pointer; font-family: monospace; font-size: 13px;
    border-radius: 3px;
  }
  button:hover { background: #3a3a3a; }
  button.active { border-color: #aaa; color: #fff; }
  button.accent { border-color: #7a9; color: #adc; }
  button.accent:hover { background: #1a2e20; }
  select {
    background: #2a2a2a; color: #d2d2d2; border: 1px solid #444;
    padding: 5px 8px; font-family: monospace; font-size: 13px;
    border-radius: 3px; cursor: pointer;
  }
  label { font-size: 13px; display: flex; align-items: center; gap: 6px; }
  input[type=range] { width: 80px; cursor: pointer; }
  input[type=number] {
    width: 52px; background: #2a2a2a; color: #d2d2d2; border: 1px solid #444;
    padding: 5px 6px; font-family: monospace; font-size: 13px; border-radius: 3px;
    text-align: center;
  }
  input[type=number]:focus { outline: none; border-color: #888; }
</style>
</head>
<body>

<div id="top">Conway's Game of Life</div>
<canvas id="canvas"></canvas>

<div id="hud">
  <div class="status" id="hud-status"></div>
  <div id="hud-info"></div>
  <div class="keys" id="hud-keys">
    Click: toggle cell &nbsp;|&nbsp; Space: pause/resume &nbsp;|&nbsp; →: step forward &nbsp;|&nbsp; ←: step back
  </div>
</div>

<div id="controls">
  <button id="btn-start">▶ Start</button>
  <button id="btn-pause">⏸ Pause</button>
  <button id="btn-step-fwd">→ Step</button>
  <button id="btn-step-bwd">← Back</button>
  <button id="btn-random">R Random</button>
  <button id="btn-clear">C Clear</button>
  <select id="sel-mode">
    <option value="finite">Finite (fixed edges)</option>
    <option value="cylinder">Cylinder (horizontal wrap)</option>
    <option value="torus">Torus (full wrap)</option>
  </select>
  <button id="btn-lines" class="active">S Grid</button>
  <button id="btn-coords">N Coord</button>
  <label>FPS: <span id="fps-val">2</span> <input type="range" id="fps-slider" min="1" max="30" value="2"></label>
  <div class="sep"></div>
  <label>Colonne: <input type="number" id="inp-cols" min="2" max="100" value="5"></label>
  <label>Righe: <input type="number" id="inp-rows" min="2" max="100" value="5"></label>
  <button id="btn-resize" class="accent">↺ Apply dimension</button>
</div>

<script>
const CELL_SIZE_MAX = 70;
const CELL_SIZE_MIN = 6;

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

// Dynamic grid dimensions
let gridCols = 5;
let gridRows = 5;
let cellSize = CELL_SIZE_MAX;

// State
let grid       = createGrid();
let history    = [];
let generation = 0;
let mode       = 'finite';
let running    = false;
let showLines  = true;
let showCoords = false;
let fps        = 2;
let intervalId = null;

// ---- Dimension helpers --------------------------------------------------

function computeCellSize(cols, rows) {
  // Fit within ~90vw width and ~70vh height, capped at CELL_SIZE_MAX
  const maxW = Math.floor(window.innerWidth  * 0.90);
  const maxH = Math.floor(window.innerHeight * 0.70);
  const byW  = Math.floor(maxW / cols);
  const byH  = Math.floor(maxH / rows);
  return Math.max(CELL_SIZE_MIN, Math.min(CELL_SIZE_MAX, byW, byH));
}

function applyDimensions(cols, rows) {
  gridCols = cols;
  gridRows = rows;
  cellSize = computeCellSize(cols, rows);
  canvas.width  = gridCols * cellSize;
  canvas.height = gridRows * cellSize;
}

// ---- Grid helpers -------------------------------------------------------

function createGrid() {
  return Array.from({length: gridRows}, () => new Uint8Array(gridCols));
}

function randomGrid(prob = 0.25) {
  return Array.from({length: gridRows}, () =>
    Uint8Array.from({length: gridCols}, () => Math.random() < prob ? 1 : 0)
  );
}

function cloneGrid(g) {
  return g.map(row => row.slice());
}

function countNeighbors(g, x, y) {
  let n = 0;
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      if (dx === 0 && dy === 0) continue;
      let nx = x + dx, ny = y + dy;
      if (mode === 'torus')         { nx = (nx + gridCols) % gridCols; ny = (ny + gridRows) % gridRows; }
      else if (mode === 'cylinder') { nx = (nx + gridCols) % gridCols; }
      if (nx >= 0 && nx < gridCols && ny >= 0 && ny < gridRows)
        n += g[ny][nx];
    }
  }
  return n;
}

function stepGrid() {
  history.push(cloneGrid(grid));
  if (history.length > 200) history.shift();
  const next = createGrid();
  for (let y = 0; y < gridRows; y++) {
    for (let x = 0; x < gridCols; x++) {
      const nb = countNeighbors(grid, x, y);
      next[y][x] = grid[y][x] ? (nb === 2 || nb === 3 ? 1 : 0) : (nb === 3 ? 1 : 0);
    }
  }
  grid = next;
  generation++;
}

function countAlive() {
  return grid.reduce((s, row) => s + row.reduce((a, v) => a + v, 0), 0);
}

// ---- Drawing ------------------------------------------------------------

function drawGrid() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let y = 0; y < gridRows; y++) {
    for (let x = 0; x < gridCols; x++) {
      ctx.fillStyle = grid[y][x] ? '#dcdcdc' : '#0f0f0f';
      ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
      if (showLines) {
        ctx.strokeStyle = '#373737';
        ctx.lineWidth = 1;
        ctx.strokeRect(x * cellSize + 0.5, y * cellSize + 0.5, cellSize - 1, cellSize - 1);
      }
      if (showCoords && cellSize >= 20) {
        ctx.fillStyle = '#6e6e6e';
        ctx.font = `${Math.max(9, Math.floor(cellSize / 5))}px monospace`;
        ctx.fillText(`${y},${x}`, x * cellSize + 3, y * cellSize + Math.floor(cellSize / 4) + 3);
      }
    }
  }
}

function updateHUD() {
  const statusTxt = running ? '▶ In esecuzione' : (generation === 0 ? '✏ Disegna la configurazione iniziale' : '⏸ In pausa');
  const sel = document.getElementById('sel-mode');
  document.getElementById('hud-status').innerHTML =
    `Stato: <span class="hi">${statusTxt}</span>  &nbsp;|&nbsp;  Modo: <span class="hi">${sel.options[sel.selectedIndex].text}</span>`;
  document.getElementById('hud-info').textContent =
    `Generazione: ${generation}   |   Celle vive: ${countAlive()} / ${gridRows * gridCols}   |   Griglia: ${gridCols}×${gridRows}   |   FPS: ${fps}`;
}

function render() {
  drawGrid();
  updateHUD();
}

// ---- Simulation loop ----------------------------------------------------

function startLoop() {
  if (intervalId) clearInterval(intervalId);
  intervalId = setInterval(() => {
    if (running) { stepGrid(); render(); }
  }, 1000 / fps);
}

function setRunning(val) {
  running = val;
  document.getElementById('btn-start').classList.toggle('active', running);
  document.getElementById('btn-pause').classList.toggle('active', !running);
}

// ---- Resize grid --------------------------------------------------------

function doResize() {
  const newCols = Math.max(2, Math.min(100, parseInt(document.getElementById('inp-cols').value) || gridCols));
  const newRows = Math.max(2, Math.min(100, parseInt(document.getElementById('inp-rows').value) || gridRows));
  setRunning(false);
  applyDimensions(newCols, newRows);
  grid = createGrid();
  history = [];
  generation = 0;
  // sync inputs in case of clamping
  document.getElementById('inp-cols').value = gridCols;
  document.getElementById('inp-rows').value = gridRows;
  render();
}

// ---- Controls -----------------------------------------------------------

document.getElementById('btn-start').addEventListener('click', () => { setRunning(true); render(); });
document.getElementById('btn-pause').addEventListener('click', () => { setRunning(false); render(); });
document.getElementById('btn-step-fwd').addEventListener('click', () => { setRunning(false); stepGrid(); render(); });
document.getElementById('btn-step-bwd').addEventListener('click', () => {
  setRunning(false);
  if (history.length) { grid = history.pop(); generation = Math.max(0, generation - 1); render(); }
});
document.getElementById('btn-random').addEventListener('click', () => {
  setRunning(false); grid = randomGrid(); generation = 0; history = []; render();
});
document.getElementById('btn-clear').addEventListener('click', () => {
  setRunning(false); grid = createGrid(); generation = 0; history = []; render();
});
document.getElementById('sel-mode').addEventListener('change', e => { mode = e.target.value; render(); });
document.getElementById('btn-lines').addEventListener('click', () => {
  showLines = !showLines;
  document.getElementById('btn-lines').classList.toggle('active', showLines);
  render();
});
document.getElementById('btn-coords').addEventListener('click', () => {
  showCoords = !showCoords;
  document.getElementById('btn-coords').classList.toggle('active', showCoords);
  render();
});
document.getElementById('fps-slider').addEventListener('input', e => {
  fps = parseInt(e.target.value);
  document.getElementById('fps-val').textContent = fps;
  startLoop();
});
document.getElementById('btn-resize').addEventListener('click', doResize);
document.getElementById('inp-cols').addEventListener('keydown', e => { if (e.key === 'Enter') doResize(); });
document.getElementById('inp-rows').addEventListener('keydown', e => { if (e.key === 'Enter') doResize(); });

// ---- Canvas click -------------------------------------------------------

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx = Math.floor((e.clientX - rect.left) * scaleX / cellSize);
  const cy = Math.floor((e.clientY - rect.top)  * scaleY / cellSize);
  if (cx >= 0 && cx < gridCols && cy >= 0 && cy < gridRows) {
    grid[cy][cx] ^= 1;
    render();
  }
});

// ---- Keyboard -----------------------------------------------------------

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.key) {
    case ' ':          e.preventDefault(); setRunning(!running); render(); break;
    case 'ArrowRight': setRunning(false); stepGrid(); render(); break;
    case 'ArrowLeft':
      setRunning(false);
      if (history.length) { grid = history.pop(); generation = Math.max(0, generation - 1); render(); }
      break;
    case 'r': case 'R': setRunning(false); grid = randomGrid(); generation = 0; history = []; render(); break;
    case 'c': case 'C': setRunning(false); grid = createGrid(); generation = 0; history = []; render(); break;
    case 'm': case 'M': {
      const sel = document.getElementById('sel-mode');
      sel.selectedIndex = (sel.selectedIndex + 1) % sel.options.length;
      mode = sel.value; render(); break;
    }
    case 's': case 'S':
      showLines = !showLines;
      document.getElementById('btn-lines').classList.toggle('active', showLines);
      render(); break;
    case 'n': case 'N':
      showCoords = !showCoords;
      document.getElementById('btn-coords').classList.toggle('active', showCoords);
      render(); break;
    case '+': case '=': {
      fps = Math.min(30, fps + 1);
      document.getElementById('fps-slider').value = fps;
      document.getElementById('fps-val').textContent = fps;
      startLoop(); render(); break;
    }
    case '-': {
      fps = Math.max(1, fps - 1);
      document.getElementById('fps-slider').value = fps;
      document.getElementById('fps-val').textContent = fps;
      startLoop(); render(); break;
    }
  }
});

// ---- Init ---------------------------------------------------------------

applyDimensions(5, 5);
startLoop();
render();
</script>
</body>
</html>
